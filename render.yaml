# Render.com Blueprint — one-click free deploy.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ai-code-reviewer-pro
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Set ONE of these in the Render dashboard (kept secret). Free first.
      - key: GROQ_API_KEY        # free, no card — https://console.groq.com/keys
        sync: false
      - key: GEMINI_API_KEY      # free — https://aistudio.google.com/app/apikey
        sync: false
      - key: OPENROUTER_API_KEY  # free models — https://openrouter.ai/keys
        sync: false
      - key: OPENAI_API_KEY      # paid — https://platform.openai.com/api-keys
        sync: false
